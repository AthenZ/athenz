# This file contains GitHub Actions Instance Provider properties for Athenz ZTS server.
# The GitHub Actions Instance Provider validates workload identity by verifying
# OIDC tokens issued by GitHub Actions. It supports both public GitHub and GitHub
# Enterprise, and issues short-lived X.509 client certificates that cannot be refreshed.

# DNS suffix used to construct and validate the SAN DNS names in the issued
# certificate. Multiple suffixes may be specified as a comma-separated list.
# Default: github-actions.athenz.io
#athenz.zts.github_actions.provider_dns_suffix=github-actions.athenz.io

# Maximum age in seconds of the OIDC token's issue time (iat claim). Tokens
# issued earlier than this many seconds ago are rejected. This bounds how long
# after a job starts a certificate request can be made.
# Default: 300 (5 minutes)
#athenz.zts.github_actions.boot_time_offset=300

# Maximum lifetime in minutes of the issued X.509 certificate.
# Default: 360 (6 hours)
#athenz.zts.github_actions.cert_expiry_time=360

# Restricts certificate issuance to jobs running under a specific GitHub
# Enterprise or a comma-separated list of GitHub Enterprise slugs. When set,
# the enterprise claim in the OIDC token must match one of the configured
# values. When not set, enterprise validation is skipped and tokens from any
# organization (including public GitHub) are accepted.
# Default: not set (no enterprise restriction)
#athenz.zts.github_actions.enterprise=

# Expected audience value (aud claim) in the GitHub Actions OIDC token.
# This must match the audience the GitHub Actions workflow was configured to
# request when generating the token.
# Default: athenz.io
#athenz.zts.github_actions.audience=athenz.io

# OIDC issuer URL for GitHub Actions tokens. Override this only when using
# a GitHub Enterprise Server instance with a custom issuer URL.
# Default: https://token.actions.githubusercontent.com
#athenz.zts.github_actions.issuer=https://token.actions.githubusercontent.com

# URL of the JWKS endpoint used to retrieve the public keys for verifying
# OIDC token signatures. When not set the provider derives the JWKS URI from
# the issuer's OpenID Connect discovery document
# (issuer/.well-known/openid-configuration). Override this only when the
# discovery document is unavailable or when testing with a local key set.
# Default: not set (derived from issuer discovery document)
#athenz.zts.github_actions.jwks_uri=
