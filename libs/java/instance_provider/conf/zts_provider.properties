# ZTS Instance Provider Configuration Properties
# Used by com.yahoo.athenz.instance.provider.impl.InstanceZTSProvider

# JWKS URI for validating JWT-based provider registration tokens.
# The provider fetches the signing keys from this endpoint to verify
# attestation tokens submitted during instance registration/refresh.
# No default value - must be configured for JWT-based attestation.
#athenz.zts.provider_jwks_uri=

# Comma-separated list of DNS suffixes for validating certificate
# request SAN DNS names. Multiple suffixes can be specified.
# Default: zts.athenz.cloud
#athenz.zts.provider_dns_suffix=zts.athenz.cloud

# Comma-separated list of service principals (in <domain>.<service> format)
# that are statically authorized to use this provider. If neither this
# property nor athenz.zts.provider_service_role is configured, all
# services are allowed.
#athenz.zts.provider_service_list=

# Role whose members are authorized to use this provider, specified
# in <domain>:role.<role-name> format. Checked when a principal is not
# found in the static athenz.zts.provider_service_list. Requires a
# configured RolesProvider to resolve role membership at runtime.
#athenz.zts.provider_service_role=

# Expiry time (in minutes) for issued provider registration tokens
# and for validating that incoming registration tokens have not expired.
# Default: 30
#athenz.zts.provider_token_expiry_time=30
