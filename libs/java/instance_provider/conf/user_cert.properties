# This file contains User Certificate Provider properties for Athenz ZTS server.
# The User Certificate Provider validates user identity by exchanging an OAuth2
# authorization code with an Identity Provider (IdP) for an access token, then
# verifying the token's subject matches the requested user name.

# OpenID Connect discovery configuration endpoint. If specified, the provider
# will automatically extract the token and JWKS endpoints from the IdP's
# OpenID configuration. When set, the idp_token_endpoint and idp_jwks_endpoint
# properties are not required. If the server is uanble to connect to the specified
# endpoint, the provider will fall back to the idp_token_endpoint and idp_jwks_endpoint
# properties. If those are not specified, the provider will fail to initialize.
#athenz.zts.user_cert.idp_config_endpoint=

# IdP token endpoint URL used to exchange the OAuth2 authorization code for
# an access token. Required if idp_config_endpoint is not configured or does
# not return a valid token endpoint.
#athenz.zts.user_cert.idp_token_endpoint=

# IdP JWKS (JSON Web Key Set) endpoint URL used to retrieve the public keys
# for verifying the access token signature. Required if idp_config_endpoint
# is not configured or does not return a valid JWKS URI.
#athenz.zts.user_cert.idp_jwks_endpoint=

# OAuth2 client ID registered with the Identity Provider. This is a required
# property and the provider will fail to initialize without it.
#athenz.zts.user_cert.idp_client_id=

# OAuth2 redirect URI used during the authorization code exchange. This must
# match the redirect URI registered with the IdP.
# Default: http://localhost:3222/oauth2/callback
#athenz.zts.user_cert.idp_redirect_uri=http://localhost:3222/oauth2/callback

# Expected audience value in the access token. If specified, the provider will
# verify that the audience claim in the token matches this value. If not set,
# audience validation is skipped.
#athenz.zts.user_cert.idp_audience=

# Connection timeout in milliseconds for HTTP requests to the IdP token
# endpoint. Default: 10000 (10 seconds)
#athenz.zts.user_cert.connect_timeout=10000

# Read timeout in milliseconds for HTTP requests to the IdP token endpoint.
# Default: 15000 (15 seconds)
#athenz.zts.user_cert.read_timeout=15000

# Custom claim name in the access token that contains the user name. By default,
# the provider uses the standard "sub" (subject) claim. If the IdP uses a
# different claim for the user name, specify it here. The provider will first
# check the subject claim and then fall back to this custom claim.
#athenz.zts.user_cert.user_name_claim=

# The following three properties are used to retrieve the OAuth2 client secret
# from the configured PrivateKeyStore. The client secret is optional - if
# idp_client_secret_keyname is not set, no client secret will be included in
# the token exchange request.

# Application name passed to the PrivateKeyStore when retrieving the client
# secret. Default: empty string
#athenz.zts.user_cert.idp_client_secret_app=

# Keygroup name passed to the PrivateKeyStore when retrieving the client
# secret. Default: empty string
#athenz.zts.user_cert.idp_client_secret_keygroup=

# Key name passed to the PrivateKeyStore when retrieving the client secret.
# If not set, the client secret lookup is skipped entirely.
# Default: empty string
#athenz.zts.user_cert.idp_client_secret_keyname=
